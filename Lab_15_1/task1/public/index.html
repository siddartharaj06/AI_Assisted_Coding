<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Records</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Student Records</h1>
        <p>Manage student records with create, update, and delete operations.</p>
      </header>

      <section class="card">
        <h2 id="form-title">Add Student</h2>
        <form id="student-form" class="form-grid">
          <input type="hidden" id="student-id" />

          <label>
            Name
            <input type="text" id="name" required />
          </label>

          <label>
            Age
            <input type="number" id="age" min="1" required />
          </label>

          <label>
            Course
            <input type="text" id="course" required />
          </label>

          <div class="actions">
            <button type="submit" id="submit-btn">Add Student</button>
            <button type="button" id="cancel-btn" class="secondary hidden">Cancel Edit</button>
          </div>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <h2>All Students</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="students-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
