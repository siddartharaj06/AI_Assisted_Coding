<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Book Management</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div>
          <h1>Library Book Management</h1>
          <p>Track books, update availability, and manage records efficiently.</p>
        </div>
      </header>

      <section class="card">
        <h2 id="form-title">Add New Book</h2>
        <form id="book-form" class="form-grid">
          <input type="hidden" id="book-id" />

          <label>
            Title
            <input id="title" type="text" required />
          </label>

          <label>
            Author
            <input id="author" type="text" required />
          </label>

          <label class="checkbox-label">
            <input id="available" type="checkbox" checked />
            Available
          </label>

          <div class="actions">
            <button type="submit" id="submit-btn">Add Book</button>
            <button type="button" id="cancel-btn" class="secondary hidden">Cancel Edit</button>
          </div>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Books</h2>
          <button id="refresh-btn" class="secondary" type="button">Refresh</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Availability</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="books-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
