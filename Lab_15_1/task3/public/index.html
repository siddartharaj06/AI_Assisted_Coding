<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Payroll</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Employee Payroll</h1>
        <p>Manage employees and salary records in a single workspace.</p>
      </header>

      <section class="card">
        <h2 id="form-title">Add Employee</h2>
        <form id="employee-form" class="form-grid">
          <input type="hidden" id="employee-id" />

          <label>
            Name
            <input id="name" type="text" required />
          </label>

          <label>
            Role
            <input id="role" type="text" required />
          </label>

          <label>
            Salary
            <input id="salary" type="number" min="1" step="0.01" required />
          </label>

          <label>
            Currency
            <input id="currency" type="text" value="USD" required />
          </label>

          <div class="actions">
            <button id="submit-btn" type="submit">Add Employee</button>
            <button id="cancel-btn" type="button" class="secondary hidden">Cancel Edit</button>
          </div>
        </form>
        <p id="status" class="status" aria-live="polite"></p>
      </section>

      <section class="card">
        <div class="list-header">
          <h2>Employees</h2>
          <button id="refresh-btn" type="button" class="secondary">Refresh</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Role</th>
                <th>Salary</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="employees-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
